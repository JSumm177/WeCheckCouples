services:
  db:
    image: mysql:8.0
    container_name: wecheck-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: wecheck_root_password
      MYSQL_DATABASE: wecheck_db
      MYSQL_USER: wecheck_user
      MYSQL_PASSWORD: wecheck_password
    ports:
      - "3307:3306"
    volumes:
      - wecheck-db-data:/var/lib/mysql

  app:
    build: .
    container_name: wecheck-app
    restart: always
    ports:
      - "8085:8085"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: wecheck_db
      DB_USER: wecheck_user
      DB_PASSWORD: wecheck_password
      PORT: 8085

  adminer:
    image: adminer
    container_name: wecheck-adminer
    restart: always
    ports:
      - "8087:8080"
    depends_on:
      - db

volumes:
  wecheck-db-data:
