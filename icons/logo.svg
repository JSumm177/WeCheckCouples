<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sage-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a9a82" />
      <stop offset="100%" stop-color="#5e7765" />
    </linearGradient>
    <linearGradient id="rose-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3a598" />
      <stop offset="100%" stop-color="#d69486" />
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Calm cream background circle for app icon mask -->
  <circle cx="256" cy="256" r="240" fill="#faf9f6" stroke="#e6eee9" stroke-width="8"/>
  
  <!-- Subtle ambient inner glow -->
  <circle cx="256" cy="256" r="220" fill="url(#sage-grad)" opacity="0.04"/>

  <!-- Stylized leaf & heart vector shapes (Carter & Jurrand connection) -->
  <g filter="url(#soft-glow)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left Rose leaf/half-heart shape (representing Carter) -->
    <path d="M256 390C256 390 120 310 120 200C120 135 170 85 235 85C270 85 296 110 296 110" 
          stroke="url(#rose-grad)" stroke-width="24"/>
    
    <!-- Right Sage leaf/half-heart shape (representing Jurrand) -->
    <path d="M256 390C256 390 392 310 392 200C392 135 342 85 277 85C242 85 216 110 216 110" 
          stroke="url(#sage-grad)" stroke-width="24"/>

    <!-- Open central balance circles representing alignment -->
    <circle cx="256" cy="180" r="18" fill="#faf9f6" stroke="url(#sage-grad)" stroke-width="6" />
    <circle cx="256" cy="245" r="28" fill="#faf9f6" stroke="url(#rose-grad)" stroke-width="6" />
  </g>
</svg>
